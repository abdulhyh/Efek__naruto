<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Jurus Naruto</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <style>
    body { margin: 0; background: black; overflow: hidden; }
    #v_src { position: fixed; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
    /* Efek video dengan z-index tinggi agar selalu di depan */
    .fx { 
        position: absolute; 
        width: 300px; 
        pointer-events: none; 
        mix-blend-mode: screen; 
        z-index: 9999; 
    }
  </style>
</head>
<body>
  <video id="v_src" autoplay playsinline></video>
  <video id="n" class="fx" src="https://framerusercontent.com/assets/B7m3jKOniK62J0XFkXl1jO0.mp4" muted autoplay loop playsinline></video>

  <script>
    const v = document.getElementById('v_src');
    const n = document.getElementById('n');
    
    // Inisialisasi Hand Tracking
    const h = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    h.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5 });
    
    h.onResults((res) => {
      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const pt = res.multiHandLandmarks[0][9]; // Titik buku jari tengah
        // Hitung posisi
        const x = (1 - pt.x) * window.innerWidth;
        const y = pt.y * window.innerHeight;
        
        n.style.left = x + 'px';
        n.style.top = y + 'px';
        n.style.display = 'block';
      } else {
        n.style.display = 'none';
      }
    });

    const cam = new Camera(v, {
      onFrame: async () => { await h.send({ image: v }); },
      width: 640, height: 480
    });
    cam.start();
  </script>
</body>
</html>
